services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      retries: 5

  coturn:
    image: coturn/coturn:latest
    restart: unless-stopped
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
    command: >
      -n --log-file=stdout
      --listening-port=3478
      --fingerprint
      --lt-cred-mech
      --user=${TURN_USER:-chat}:${TURN_PASSWORD:-chatpass}
      --realm=realtime-chat
      --external-ip=${TURN_EXTERNAL_IP:-127.0.0.1}

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3004:3004"
    environment:
      MONGODB_URI: mongodb://mongo:27017/realtime_chat
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-dev-secret-change-me}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:5176}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@chat.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin123!}
      ADMIN_NAME: ${ADMIN_NAME:-admin}
      UPLOAD_DIR: /data/uploads
      MAX_FILE_SIZE_MB: "25"
      TURN_HOST: ${TURN_HOST:-localhost}
      TURN_PORT: "3478"
      TURN_USER: ${TURN_USER:-chat}
      TURN_PASSWORD: ${TURN_PASSWORD:-chatpass}
      CORS_ORIGIN: http://localhost:5176,http://localhost:80
    volumes:
      - uploads_data:/data/uploads
    depends_on:
      mongo:
        condition: service_healthy
      coturn:
        condition: service_started

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5176:80"
    environment:
      API_PROXY_TARGET: http://server:3004
    depends_on:
      - server

volumes:
  mongo_data:
  uploads_data:
