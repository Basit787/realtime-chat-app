services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      retries: 5
      start_period: 10s

  mongo-express:
    image: mongo-express:1
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongo:27017/
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      mongo:
        condition: service_healthy

  server:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3004:3004"
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017/realtime_chat
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      CORS_ORIGIN: http://localhost:5176,http://localhost:80
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:
